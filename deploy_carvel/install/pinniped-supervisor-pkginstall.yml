---
apiVersion: packaging.carvel.dev/v1alpha1
kind: PackageInstall
metadata:
    # name, does not have to be versioned, versionSelection.constraints below will handle
    name: "pinniped-supervisor-package-install"
    namespace: "pinniped-supervisor-install-ns"
spec:
  serviceAccountName: "pinniped-package-rbac-pinniped-supervisor-sa-superadmin-dangerous"
  packageRef:
    refName: "pinniped-supervisor.pinniped.dev"
    versionSelection:
      constraints: "0.0.0-F0E90D53-1639-4B7A-8C25-C42C7827429D"
  values:
  - secretRef:
      name: "pinniped-supervisor-package-install-secret"
